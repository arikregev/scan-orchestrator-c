syntax = "proto3";

package ocsf.v1_7_0.events.application;

option java_multiple_files = true;
option java_package = "io.acme.scans.ingress.ocsf.proto";
option java_outer_classname = "ApplicationProto";

import "google/protobuf/struct.proto";
import "ocsf/v1_7_0/objects/objects.proto";

// OCSF Scan Activity (v1.7.0) — subset used for Kafka ingress.
// Top-level field numbers align with OCSF application ScanActivity where listed.
message ScanActivity {
  string activity_name = 4;
  string category_name = 9;
  string class_name = 11;

  ocsf.v1_7_0.objects.Metadata metadata = 30;
  Scan scan = 51;

  int64 time = 60;

  google.protobuf.Struct unmapped = 65;
}

message Scan {
  string type = 1;
  string uid = 2;
  string type_id = 3;
}
