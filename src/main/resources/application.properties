quarkus.application.name=scans-orchestrator

# Kafka - OCSF Scan Activity ingress (binary protobuf: ocsf.v1_7_0.events.application.ScanActivity)
mp.messaging.incoming.ocsf-scan-activity.connector=smallrye-kafka
mp.messaging.incoming.ocsf-scan-activity.topic=ocsf.scan.activity
mp.messaging.incoming.ocsf-scan-activity.auto.offset.reset=earliest
mp.messaging.incoming.ocsf-scan-activity.value.deserializer=io.acme.scans.ingress.kafka.OcsfScanActivityProtoDeserializer

# Send failed messages to a DLQ (mapping/validation/etc.)
mp.messaging.incoming.ocsf-scan-activity.failure-strategy=dead-letter-queue
mp.messaging.incoming.ocsf-scan-activity.dead-letter-queue.topic=ocsf.scan.activity.dlq

# Temporal
temporal.target=localhost:7233
temporal.namespace=default
temporal.task-queue=scans-orchestrator

# Checkmarx One — auth modes: bearer | oauth2 | refresh_token
checkmarx-one.base-url=https://ast.checkmarx.net
checkmarx-one.auth.mode=bearer
checkmarx-one.auth.bearer-token=${CHECKMARX_ONE_TOKEN:}
# IAM (used when token-url is blank): https://iam.checkmarx.net/auth/realms/<tenant>/protocol/openid-connect/token
checkmarx-one.auth.iam-base-url=https://iam.checkmarx.net
checkmarx-one.auth.tenant=${CHECKMARX_ONE_TENANT:}
checkmarx-one.auth.token-url=
checkmarx-one.auth.client-id=${CHECKMARX_ONE_CLIENT_ID:}
checkmarx-one.auth.client-secret=${CHECKMARX_ONE_CLIENT_SECRET:}
checkmarx-one.auth.scope=
checkmarx-one.auth.refresh-token=${CHECKMARX_ONE_REFRESH_TOKEN:}

# Quarkus REST client base URL for Checkmarx One
quarkus.rest-client.checkmarx-one.url=${checkmarx-one.base-url}

# Checkmarx SCA REST API (used for SCA manifest/binary workflows)
checkmarx-sca.base-url=https://api-sca.checkmarx.net
checkmarx-sca.team-prefix=/CxServer/

# Quarkus REST client base URL for Checkmarx SCA
quarkus.rest-client.checkmarx-sca.url=${checkmarx-sca.base-url}

# SBOM storage (S3). Key pattern: /appid/componentName/buildid.json
sbom.s3.bucket=
sbom.s3.region=us-east-1
sbom.s3.endpoint-override=

# Optional static credentials (otherwise uses default AWS chain: env/instance profile/etc.)
sbom.s3.credentials.access-key-id=${SBOM_S3_ACCESS_KEY_ID:}
sbom.s3.credentials.secret-access-key=${SBOM_S3_SECRET_ACCESS_KEY:}
sbom.s3.credentials.session-token=${SBOM_S3_SESSION_TOKEN:}

# Dependency-Track (backend URL, typically port 8081)
dependency-track.base-url=http://localhost:8081
dependency-track.api-key=${DEPENDENCY_TRACK_API_KEY:}
